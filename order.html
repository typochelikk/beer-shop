<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа — Craft Beer</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ==================== ШАПКА САЙТА (NAVBAR) ==================== -->
    <nav class="custom-navbar">
        <div class="navbar-container">
            <a class="logo-link" href="index.html">
                <img src="img/logo.png" alt="Логотип" height="120">
            </a>
            <div class="menu-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="#">О нас</a>
                <a href="#">Контакты</a>
            </div>
            <a href="order.html" class="cart-icon-link">🛒</a>
            <form class="search-form">
                <input type="search" placeholder="Поиск">
                <button type="submit">Найти</button>
            </form>
        </div>
    </nav>

    <!-- ==================== ОСНОВНОЙ КОНТЕНТ ЗАКАЗА ==================== -->
    <main class="order-main-container">
        <div class="order-flex-row">
            
            <!-- Левый блок: Форма данных -->
            <div class="order-left-column">
                <form class="order-form" id="order-form">
                    <div class="form-group-custom">
                        <input type="text" id="user-fio" placeholder="Введите ваше ФИО">
                    </div>
                    <div class="form-group-custom">
                        <input type="tel" id="user-phone" placeholder="Введите ваш номер">
                    </div>
                    <div class="form-group-custom">
                        <input type="text" id="user-address" placeholder="Введите адрес">
                    </div>
                    <div class="form-group-custom">
                        <select>
                            <option value="" disabled selected>Выберите время доставки (с 11:00 до 22:00)</option>
                            <option value="11-14">С 11:00 до 14:00</option>
                            <option value="14-18">С 14:00 до 18:00</option>
                            <option value="18-22">С 18:00 до 22:00</option>
                        </select>
                    </div>
                    
                    <!-- Интерактивные кнопки переключения БЕЗ JavaScript -->
                    <div class="delivery-toggle-pure-css">
                        <input type="radio" id="toggle-delivery" name="delivery-type" checked>
                        <label for="toggle-delivery" class="lbl-delivery">Доставка</label>

                        <input type="radio" id="toggle-pickup" name="delivery-type">
                        <label for="toggle-pickup" class="lbl-pickup">Самовывоз</label>
                    </div>

                    <!-- Кнопка ЗАКАЗАТЬ строго под правым блоком -->
                    <div class="order-btn-row">
                        <button type="submit" class="btn-submit-order-large">ЗАКАЗАТЬ</button>
                    </div>
                </form>
            </div>

            <!-- Правый блок: Чек заказа -->
            <div class="order-right-column">
                <div class="order-receipt-card">
                    <div class="receipt-section font-weight-bold section-title">Ваш заказ:</div>
                    <div class="receipt-section">
                        <ul class="receipt-list mb-0" id="cart-items-list">
                            <!-- Сюда JavaScript добавит выбранное пиво -->
                        </ul>
                    </div>
                    <div class="receipt-section font-weight-bold" id="receipt-delivery">Доставка: 0 руб.</div>
                    <div class="receipt-section font-weight-bold text-dark-brown" id="receipt-total">Итого: 0 руб.</div>
                </div>
            </div>

        </div> <!-- Конец строки order-flex-row -->
    </main>

<!-- Модальное окно Bootstrap для вывода сообщений -->
<div class="modal fade" id="statusModal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content" style="background-color: #edd3c4; border: 2px solid #4a2f25;">
      <div class="modal-header" style="border-bottom: 1px solid #4a2f25;">
        <h5 class="modal-title font-weight-bold" id="modalTitle" style="color: #4a2f25;">Статус заказа</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true" style="color: #4a2f25;">&times;</span>
        </button>
      </div>
      <div class="modal-body text-center font-weight-bold" id="modalBody" style="color: #331f18; font-size: 1.2rem;">
        <!-- Сюда JavaScript будет подставлять текст -->
      </div>
      <div class="modal-footer" style="border-top: none;">
        <!-- Изменили класс кнопки здесь: -->
        <button type="button" class="btn-modal-close py-2 px-4" data-dismiss="modal" style="margin: 0 auto;">Отлично</button>
      </div>
    </div>
  </div>
</div>

    <!-- ==================== ПОДВАЛ САЙТА (FOOTER) ==================== -->
    <footer class="custom-footer text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 Магазин крафтового пива "Craft Beer". Чрезмерное употребление алкоголя вредит вашему здоровью</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
